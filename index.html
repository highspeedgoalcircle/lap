<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>井字過三關</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #312e81);
            color: white;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            font-size: 42px;
            margin-bottom: 8px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        
        .subtitle {
            font-size: 18px;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        
        .score-board {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin: 20px 0;
            font-size: 22px;
        }
        
        .player {
            padding: 10px 30px;
            border-radius: 50px;
            background: rgba(255,255,255,0.15);
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 420px;
            height: 420px;
            margin: 30px auto;
            background: #1e2937;
            padding: 15px;
            border-radius: 24px;
            gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .cell {
            background: #334155;
            font-size: 110px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            aspect-ratio: 1 / 1;
            user-select: none;
        }
        
        .cell:hover {
            background: #475569;
            transform: scale(1.03);
        }
        
        .cell.x { color: #fbbf24; }
        .cell.o { color: #67e8f9; }
        
        .status {
            font-size: 26px;
            margin: 20px 0;
            min-height: 40px;
        }
        
        button {
            padding: 14px 32px;
            font-size: 18px;
            background: #f59e0b;
            color: black;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin: 8px;
        }
    </style>
</head>
<body>
    <h1>井字過三關</h1>
    <p class="subtitle">先贏 3 局即獲得勝利！</p>
    
    <div class="score-board">
        <div class="player">你 (X) <span id="player-score">0</span></div>
        <div class="player">電腦 (O) <span id="computer-score">0</span></div>
    </div>
    
    <div class="board" id="board"></div>
    
    <div class="status" id="status">你的回合 (X)</div>
    
    <div>
        <button onclick="resetGame()">重新一局</button>
        <button onclick="resetMatch()">重置比賽</button>
    </div>

    <script>
        let board = Array(9).fill(null);
        let currentPlayer = 'X';
        let gameActive = true;
        let playerScore = 0;
        let computerScore = 0;
        let cells = [];
        
        const winningConditions = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];
        
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        
        function createBoard() {
            boardElement.innerHTML = '';
            cells = [];
            board = Array(9).fill(null);
            
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                boardElement.appendChild(cell);
                cells.push(cell);
            }
        }
        
        function handleCellClick(e) {
            const index = parseInt(e.target.dataset.index);
            if (board[index] || !gameActive || currentPlayer !== 'X') return;
            
            makeMove(index, 'X');
            if (gameActive) setTimeout(computerMove, 400);
        }
        
        function makeMove(index, player) {
            board[index] = player;
            cells[index].textContent = player;
            cells[index].classList.add(player.toLowerCase());
            
            const winResult = checkWin(player);
            if (winResult) {
                handleWin(player);
                return;
            }
            
            if (!board.includes(null)) {
                handleDraw();
                return;
            }
            
            currentPlayer = player === 'X' ? 'O' : 'X';
            statusElement.textContent = currentPlayer === 'X' ? '你的回合 (X)' : '電腦思考中...';
        }
        
        function computerMove() {
            if (!gameActive || currentPlayer !== 'O') return;
            
            let move = findBestMove();
            if (move !== null) makeMove(move, 'O');
        }
        
        function findBestMove() {
            for (let i = 0; i < 9; i++) {
                if (!board[i]) {
                    board[i] = 'O';
                    if (checkWin('O')) { board[i] = null; return i; }
                    board[i] = null;
                }
            }
            for (let i = 0; i < 9; i++) {
                if (!board[i]) {
                    board[i] = 'X';
                    if (checkWin('X')) { board[i] = null; return i; }
                    board[i] = null;
                }
            }
            let empty = board.map((v,i) => v===null ? i : null).filter(v=>v!==null);
            return empty[Math.floor(Math.random()*empty.length)];
        }
        
        function checkWin(player) {
            return winningConditions.find(cond => cond.every(i => board[i] === player));
        }
        
        function handleWin(player) {
            gameActive = false;
            if (player === 'X') {
                playerScore++;
                document.getElementById('player-score').textContent = playerScore;
                statusElement.innerHTML = '🎉 你贏了這局！';
            } else {
                computerScore++;
                document.getElementById('computer-score').textContent = computerScore;
                statusElement.innerHTML = '🤖 電腦獲勝';
            }
            if (playerScore < 3 && computerScore < 3) {
                setTimeout(resetGame, 1600);
            }
        }
        
        function handleDraw() {
            gameActive = false;
            statusElement.textContent = "平局！";
            setTimeout(resetGame, 1400);
        }
