<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>立言過三關</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #312e81);
            color: white;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        
        h1 { font-size: 42px; margin-bottom: 8px; }
        .subtitle { font-size: 18px; margin-bottom: 20px; opacity: 0.9; }
        
        .mode-select {
            margin: 20px 0;
        }
        
        .mode-btn {
            padding: 12px 28px;
            font-size: 18px;
            margin: 0 10px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .mode-btn.active {
            background: #f59e0b;
            color: black;
        }
        .mode-btn:not(.active) {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        .score-board {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin: 20px 0;
            font-size: 22px;
        }
        .player { padding: 10px 30px; border-radius: 50px; background: rgba(255,255,255,0.15); }
        
        .board {
            width: 390px;
            height: 390px;
            margin: 30px auto;
            background: #1e2937;
            padding: 15px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .cell {
            width: 110px;
            height: 110px;
            background: #334155;
            font-size: 92px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            flex-shrink: 0;
        }
        
        .cell:hover { background: #475569; transform: scale(1.08); }
        .cell.x { color: #fbbf24; }
        .cell.o { color: #67e8f9; }
        
        .status { font-size: 26px; margin: 20px 0; min-height: 40px; }
        
        button {
            padding: 14px 32px;
            font-size: 18px;
            background: #f59e0b;
            color: black;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin: 8px;
        }
    </style>
</head>
<body>
    <h1>立言過三關</h1>
    <p class="subtitle">先贏 3 局即獲得勝利！</p>
    
    <div class="mode-select">
        <button class="mode-btn active" id="pve-btn" onclick="setMode('pve')">對戰電腦</button>
        <button class="mode-btn" id="pvp-btn" onclick="setMode('pvp')">雙人對戰</button>
    </div>
    
    <div class="score-board">
        <div class="player">玩家 X <span id="player-score">0</span></div>
        <div class="player">玩家 O <span id="computer-score">0</span></div>
    </div>
    
    <div class="board" id="board"></div>
    
    <div class="status" id="status">你的回合 (X)</div>
    
    <div>
        <button onclick="resetGame()">重新一局</button>
        <button onclick="resetMatch()">重置比賽</button>
    </div>

    <script>
        let boardState = Array(9).fill(null);
        let currentPlayer = 'X';
        let gameActive = true;
        let playerScore = 0;
        let computerScore = 0;
        let gameMode = 'pve'; // 'pve' 或 'pvp'
        
        const winningConditions = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];
        
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        
        function setMode(mode) {
            gameMode = mode;
            document.getElementById('pve-btn').classList.toggle('active', mode === 'pve');
            document.getElementById('pvp-btn').classList.toggle('active', mode === 'pvp');
            resetGame();
        }
        
        function createBoard() {
            boardEl.innerHTML = '';
            boardState = Array(9).fill(null);
            
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleClick(i));
                boardEl.appendChild(cell);
            }
        }
        
        function handleClick(index) {
            if (boardState[index] || !gameActive) return;
            
            makeMove(index, currentPlayer);
            
            if (gameActive && gameMode === 'pve' && currentPlayer === 'O') {
                setTimeout(computerMove, 450);
            }
        }
        
        function makeMove(index, player) {
            boardState[index] = player;
            const cell = boardEl.children[index];
            cell.textContent = player;
            cell.classList.add(player.toLowerCase());
            
            if (checkWin(player)) {
                handleWin(player);
                return;
            }
            
            if (!boardState.includes(null)) {
                handleDraw();
                return;
            }
            
            currentPlayer = player === 'X' ? 'O' : 'X';
            statusEl.textContent = `${currentPlayer === 'X' ? 'X' : 'O'} 的回合`;
        }
        
        function checkWin(player) {
            return winningConditions.some(cond => cond.every(i => boardState[i] === player));
        }
        
        function handleWin(player) {
            gameActive = false;
            if (player === 'X') playerScore++;
            else computerScore++;
            
            document.getElementById('player-score').textContent = playerScore;
            document.getElementById('computer-score').textContent = computerScore;
            
            statusEl.textContent = player === 'X' ? '🎉 X 獲勝！' : '🎉 O 獲勝！';
            
            if (playerScore < 3 && computerScore < 3) {
                setTimeout(resetGame, 1600);
            }
        }
        
        function handleDraw() {
            gameActive = false;
            statusEl.textContent = "平局！";
            setTimeout(resetGame, 1400);
        }
        
        function computerMove() {
            if (!gameActive || currentPlayer !== 'O') return;
            
            // 簡單 AI
            for (let i = 0; i < 9; i++) {
                if (!boardState[i]) {
                    boardState[i] = 'O';
                    if (checkWin('O')) { boardState[i] = null; makeMove(i, 'O'); return; }
                    boardState[i] = null;
                }
            }
            for (let i = 0; i < 9; i++) {
                if (!boardState[i]) {
                    boardState[i] = 'X';
                    if (checkWin('X')) { boardState[i] = null; makeMove(i, 'O'); return; }
                    boardState[i] = null;
                }
            }
            
            const empty = boardState.map((v,i) => v ? null : i).filter(v => v !== null);
            if (empty.length) makeMove(empty[Math.floor(Math.random() * empty.length)], 'O');
        }
        
        function resetGame() {
            createBoard();
            gameActive = true;
            currentPlayer = 'X';
            statusEl.textContent = 'X 的回合';
        }
        
        function resetMatch() {
            playerScore = computerScore = 0;
            document.getElementById('player-score').textContent = '0';
            document.getElementById('computer-score').textContent = '0';
            resetGame();
        }
        
        window.onload = () => {
            createBoard();
        };
    </script>
</body>
</html>
