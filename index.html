<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 小遊戲合集</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #312e81);
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 48px; margin: 30px 0 10px; }
        
        .menu {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 50px 0;
            flex-wrap: wrap;
        }
        .game-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px 20px;
            width: 320px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .game-card:hover {
            transform: translateY(-15px);
            background: rgba(245, 158, 11, 0.3);
        }
        
        #game-area { display: none; }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background: #f59e0b;
            color: black;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 8px;
        }
        
        /* 井字遊戲樣式 - 修正重點 */
        .board {
            width: 390px;
            height: 390px;
            margin: 20px auto;
            background: #1e2937;
            padding: 15px;
            border-radius: 24px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        .cell {
            background: #334155;
            font-size: 88px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            aspect-ratio: 1 / 1;
        }
        .cell:hover { background: #475569; transform: scale(1.05); }
        .cell.x { color: #fbbf24; }
        .cell.o { color: #67e8f9; }
        
        /* 貪食蛇 */
        canvas { 
            border: 4px solid #22d3ee; 
            border-radius: 12px; 
            background: #1e2937; 
        }
    </style>
</head>
<body>
    <div class="container" id="menu">
        <h1>🕹️ HTML 小遊戲合集</h1>
        <p style="font-size:20px;">選擇你要玩的遊戲</p>
        
        <div class="menu">
            <div class="game-card" onclick="startGame('tictactoe')">
                <h2>井字過三關</h2>
                <p>先贏 3 局獲得勝利！</p>
            </div>
            <div class="game-card" onclick="startGame('snake')">
                <h2>🐍 貪食蛇</h2>
                <p>經典貪吃蛇，吃越多分數越高</p>
            </div>
        </div>
    </div>

    <!-- 遊戲區域 -->
    <div id="game-area">
        <button onclick="backToMenu()" style="margin:15px;">← 返回選單</button>
        
        <!-- 井字過三關 -->
        <div id="tictactoe-container">
            <h2>井字過三關</h2>
            <div style="margin:15px 0">
                <button onclick="setTicMode('pve')" id="pve-btn" class="mode-btn active">對戰電腦</button>
                <button onclick="setTicMode('pvp')" id="pvp-btn" class="mode-btn">雙人對戰</button>
            </div>
            <div style="display:flex;justify-content:center;gap:50px;margin:10px 0;font-size:20px">
                <div>玩家 X <span id="x-score">0</span></div>
                <div>玩家 O <span id="o-score">0</span></div>
            </div>
            <div id="tic-board" class="board"></div>
            <div id="tic-status" style="font-size:24px;margin:15px 0">X 的回合</div>
            <button onclick="resetTicGame()">重新一局</button>
            <button onclick="resetTicMatch()">重置比賽</button>
        </div>
        
        <!-- 貪食蛇 -->
        <div id="snake-container" style="display:none">
            <h2>🐍 貪食蛇</h2>
            <canvas id="snake-canvas" width="400" height="400"></canvas>
            <div style="margin:15px 0;font-size:22px">分數: <span id="snake-score">0</span></div>
            <button onclick="startSnake()">開始新遊戲</button>
        </div>
    </div>

    <script>
        // ==================== 變數 ====================
        let ticBoardState = Array(9).fill(null);
        let ticCurrentPlayer = 'X';
        let ticGameActive = true;
        let ticXScore = 0, ticOScore = 0;
        let ticMode = 'pve';
        let snakeInterval;
        
        // ==================== 主選單 ====================
        function startGame(game) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            
            document.getElementById('tictactoe-container').style.display = game === 'tictactoe' ? 'block' : 'none';
            document.getElementById('snake-container').style.display = game === 'snake' ? 'block' : 'none';
            
            if (game === 'tictactoe') initTicTacToe();
            if (game === 'snake') initSnake();
        }
        
        function backToMenu() {
            document.getElementById('menu').style.display = 'block';
            document.getElementById('game-area').style.display = 'none';
            if (snakeInterval) clearInterval(snakeInterval);
        }
        
        // ==================== 井字過三關 ====================
        function initTicTacToe() {
            ticBoardState = Array(9).fill(null);
            ticCurrentPlayer = 'X';
            ticGameActive = true;
            createTicBoard();
        }
        
        function createTicBoard() {
            const board = document.getElementById('tic-board');
            board.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => ticHandleClick(i));
                board.appendChild(cell);
            }
            document.getElementById('tic-status').textContent = 'X 的回合';
        }
        
        function ticHandleClick(index) {
            if (ticBoardState[index] || !ticGameActive) return;
            makeTicMove(index, ticCurrentPlayer);
        }
        
        function makeTicMove(index, player) {
            ticBoardState[index] = player;
            const cell = document.querySelector(`#tic-board .cell[data-index="${index}"]`);
            cell.textContent = player;
            cell.classList.add(player.toLowerCase());
            
            if (checkTicWin(player)) {
                handleTicWin(player);
                return;
            }
            if (!ticBoardState.includes(null)) {
                document.getElementById('tic-status').textContent = "平局！";
                setTimeout(initTicTacToe, 1400);
                return;
            }
            
            ticCurrentPlayer = player === 'X' ? 'O' : 'X';
            document.getElementById('tic-status').textContent = `${ticCurrentPlayer} 的回合`;
            
            if (ticMode === 'pve' && ticCurrentPlayer === 'O') {
                setTimeout(computerTicMove, 500);
            }
        }
        
        function checkTicWin(player) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(combo => combo.every(i => ticBoardState[i] === player));
        }
        
        function handleTicWin(player) {
            ticGameActive = false;
            if (player === 'X') ticXScore++;
            else ticOScore++;
            document.getElementById('x-score').textContent = ticXScore;
            document.getElementById('o-score').textContent = ticOScore;
            document.getElementById('tic-status').textContent = player === 'X' ? '🎉 X 獲勝！' : '🎉 O 獲勝！';
            if (ticXScore < 3 && ticOScore < 3) setTimeout(initTicTacToe, 1600);
        }
        
        function computerTicMove() {
            if (!ticGameActive || ticCurrentPlayer !== 'O') return;
            for (let i = 0; i < 9; i++) {
                if (!ticBoardState[i]) {
                    ticBoardState[i] = 'O';
                    if (checkTicWin('O')) { ticBoardState[i] = null; makeTicMove(i, 'O'); return; }
                    ticBoardState[i] = null;
                }
            }
            const empty = ticBoardState.map((v,i) => v ? null : i).filter(v => v !== null);
            if (empty.length) makeTicMove(empty[Math.floor(Math.random()*empty.length)], 'O');
        }
        
        function setTicMode(mode) {
            ticMode = mode;
            document.getElementById('pve-btn').classList.toggle('active', mode === 'pve');
            document.getElementById('pvp-btn').classList.toggle('active', mode === 'pvp');
            initTicTacToe();
        }
        
        function resetTicGame() { initTicTacToe(); }
        function resetTicMatch() {
            ticXScore = ticOScore = 0;
            document.getElementById('x-score').textContent = '0';
            document.getElementById('o-score').textContent = '0';
            initTicTacToe();
        }
        
        // ==================== 貪食蛇 ====================
        function initSnake() {
            const canvas = document.getElementById('snake-canvas');
            const ctx = canvas.getContext('2d');
            let snake = [{x:200,y:200}], dx=20, dy=0, score=0, food={x:300,y:300};
            
            function gameLoop() {
                const head = {x: snake[0].x + dx, y: snake[0].y + dy};
                if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400 || 
                    snake.some(s => s.x === head.x && s.y === head.y)) {
                    clearInterval(snakeInterval);
                    alert('遊戲結束！分數：' + score);
                    return;
                }
                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    document.getElementById('snake-score').textContent = score;
                    food = {x: Math.floor(Math.random()*19)*20, y: Math.floor(Math.random()*19)*20};
                } else snake.pop();
                
                ctx.fillStyle = '#1e2937';
                ctx.fillRect(0,0,400,400);
                ctx.fillStyle = '#22d3ee';
                snake.forEach(s => ctx.fillRect(s.x, s.y, 20, 20));
                ctx.fillStyle = '#f59e0b';
                ctx.fillRect(food.x, food.y, 20, 20);
            }
            
            document.addEventListener('keydown', e => {
                if (e.key === 'ArrowUp' && dy !== 20) { dx=0; dy=-20; }
                if (e.key === 'ArrowDown' && dy !== -20) { dx=0; dy=20; }
                if (e.key === 'ArrowLeft' && dx !== 20) { dx=-20; dy=0; }
                if (e.key === 'ArrowRight' && dx !== -20) { dx=20; dy=0; }
            });
            
            if (snakeInterval) clearInterval(snakeInterval);
            snakeInterval = setInterval(gameLoop, 110);
        }
        
        function startSnake() {
            initSnake();
        }
        
        window.onload = () => {};
    </script>
</body>
</html>
